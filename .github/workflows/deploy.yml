name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/doctype02/intemperie-frontend:latest

      - name: Update Railway service to use Docker image
        run: |
          curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"8ebcf6ae-4649-4e06-b0d7-76eefcb523ca\", environmentId: \"f2773608-fa30-487c-a1df-72ec4d1451c5\", input: { source: { image: \"ghcr.io/doctype02/intemperie-frontend:latest\" } }) }"
            }'
